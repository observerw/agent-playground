name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: apg

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2

  publish-crate:
    name: Publish crate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify package
        run: cargo package --allow-dirty

      - uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish --locked

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            use-cross: true
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build binary with cargo
        if: ${{ !matrix.use-cross }}
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Build binary with cross
        if: ${{ matrix.use-cross }}
        shell: bash
        run: cross build --release --locked --target "${{ matrix.target }}"

      - name: Package Unix archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          tar -czf "dist/${BINARY_NAME}-${{ matrix.target }}.tar.gz" -C dist "${BINARY_NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }}

  publish-installer:
    name: Publish installer
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render installer script
        shell: bash
        run: |
          mkdir -p dist
          sed "s|__GITHUB_REPOSITORY__|${GITHUB_REPOSITORY}|g" scripts/install.sh > dist/install-apg.sh
          chmod +x dist/install-apg.sh

      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install-apg.sh
